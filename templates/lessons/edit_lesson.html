{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <h2>Edit Lesson</h2>
    <div class="card p-3">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                    <div class="collapse navbar-collapse" id="menu">
                        <ul class="navbar-nav me-auto">

                        <li class="nav-item">
                        <a class="nav-link" href="/lesson/lesson-dashboard/">Lesson</a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link" href="/courses/">Courses</a>
                        </li>

                        </ul>

                        <ul class="navbar-nav">

                        <li class="nav-item">
                        <a class="nav-link" href="/create-course/">Create Course</a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link" href="/lesson/lesson-dashboard/">Create Lesson</a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link" href="/accounts/logout/">Logout</a>
                        </li>

                        </ul>
                    </div>
            </div>
        </nav>
    </div>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" value="{{ lesson.title }}" class="form-control mb-3">

        <textarea name="content" class="form-control mb-3">
            {{ lesson.content }}
        </textarea>

        <select name="course" class="form-control mb-3">

            {% for course in courses %}

            <option value="{{ course.id }}"
                {% if course.id == lesson.course.id %}selected{% endif %}>
                {{ course.title }}
            </option>

            {% endfor %}

        </select>

        <button class="btn btn-success">Update</button>

    </form>

</div>

{% endblock %}
