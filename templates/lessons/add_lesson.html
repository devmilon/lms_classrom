{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2>Add Lesson</h2>
  <div class="card p-3 mb-3">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                    <div class="collapse navbar-collapse" id="menu">
                        <ul class="navbar-nav me-auto">

                        <li class="nav-item">
                        <a class="nav-link" href="/lesson/lesson-dashboard/">Lesson</a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link" href="/courses/">Courses</a>
                        </li>

                        </ul>

                        <ul class="navbar-nav">

                        <li class="nav-item">
                        <a class="nav-link" href="/create-course/">Create Course</a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link" href="/lesson/lesson-dashboard/">Create Lesson</a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link" href="/accounts/logout/">Logout</a>
                        </li>

                        </ul>
                    </div>
            </div>
        </nav>
  </div>

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="title"
               class="form-control mb-3 p-3"
               placeholder="Lesson Title">

        <textarea name="content"
                  class="form-control mb-3"
                  placeholder="Lesson Content"></textarea>

        <input type="url"
               name="video_url"
               class="form-control mb-3 p-3"
               placeholder="Video URL (YouTube link)">

        <select name="course"
                class="form-control mb-3">

            {% for course in courses %}
            <option value="{{ course.id }}">
                {{ course.title }}
            </option>
            {% endfor %}

        </select>

        <button class="btn btn-primary">
            Save Lesson
        </button>

    </form>

</div>

{% endblock %}
